name: trustvault

services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:?DEMO_MODE is required}
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,mode=1777
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      proxy:
        aliases:
          - trustvault-web

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=32m,mode=1777
    environment:
      NODE_ENV: production
      DEMO_MODE: ${DEMO_MODE:?DEMO_MODE is required}
      APP_NAME: TrustVault Lite
      PORT: 4000
      PUBLIC_ORIGIN: https://${APP_DOMAIN:-vault.norvix.no}
      DATABASE_URL: postgres://trustvault_app:${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}@postgres:5432/trustvault
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:?INTERNAL_WORKER_TOKEN is required}
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      proxy:
        aliases:
          - trustvault-api
      data:

  migrate:
    image: postgres:17.5-alpine
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command:
      - psql
      - --set
      - app_database_password=${APP_DATABASE_PASSWORD:?APP_DATABASE_PASSWORD is required}
      - --host
      - postgres
      - --username
      - trustvault
      - --dbname
      - trustvault
      - --file
      - /migrations/0001_initial_rls.sql
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations:ro
    networks:
      - data

  postgres:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trustvault
      POSTGRES_USER: trustvault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustvault -d trustvault"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data

networks:
  proxy:
    external: true
  data:
    internal: true

volumes:
  postgres_data:
